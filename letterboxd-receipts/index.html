<!DOCTYPE html>
<html>
    <head>
        <title>Letterboxd Receipt Printer</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav style="font-size: 1rem; position: fixed; top: 3rem; left: 3rem;">
            <button onclick="homepage()" style="background-color: #00e054; border-radius: 2px; border-color: #14181c; color: #14181c;">HOME</button>
        </nav>
        <canvas id="Rain"></canvas>
        <div id="homepage">
        <header>Letterboxd Receipt Printer</header>
        <main>
        <input type="text" placeholder="Enter username" id="username">
        <button onclick="fetchMovies()">Generate</button>
        <hr style="margin-bottom: 3px;">
        </main>
        <footer>Made by <a href="https://google.com">Lucas Zhang</a></footer>
        </div>
        <div style="display: flex; flex-direction: row; gap: 2rem; align-items: center;">
            <div id="receipt">
                <p id="title"></p>
                <p class="text" id="director" style="align-self: center; margin-bottom: 0.15rem;">from Ryan Coogler</p>
                <p class="text" id="number" style="font-weight: 450;">order #</p>
                <p class="text" id="date" style="font-weight: 450;"></p>
                <p class="divider" id="firstDivider"></p>
                <p class="text" id="rating" style="padding-top: 0px;">rating: </p>
                <p class="divider" id="secondDivider"></p>
                <p class="text" style="align-self: center; text-transform: uppercase;">Thank you for visiting!</p>
                <img id="barcode" src="barcode.png">
                <p>letterboxd.receipt.com</p>
            </div>
            <div id="selection-window">
                <header>Create a receipt for:</header>
                <button onclick="printReceipt(1)" class="rectangle"></button>
                <button onclick="printReceipt(2)" class="rectangle"></button>
                <button onclick="printReceipt(3)" class="rectangle"></button>
                <button onclick="printReceipt(4)" class="rectangle"></button>
                <button onclick="printReceipt(5)" class="rectangle"></button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
